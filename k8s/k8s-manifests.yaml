# =============================================================================
#  XAI-Lab Kubernetes Manifests
#  Apply with: kubectl apply -f k8s/k8s-manifests.yaml
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: credit-trainer-dataset-1
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app: credit-trainer
            dataset: "1"
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          containers:
            - name: credit-trainer
              image: xai-credit-trainer:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: DATASET_ID
                  value: "1"
                - name: SHARED_VOLUME
                  value: /shared-volume
              volumeMounts:
                - name: model-volume
                  mountPath: /shared-volume
          volumes:
            - name: model-volume
              persistentVolumeClaim:
                claimName: model-pvc

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: credit-trainer-dataset-2
spec:
  schedule: "1-59/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app: credit-trainer
            dataset: "2"
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          containers:
            - name: credit-trainer
              image: xai-credit-trainer:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: DATASET_ID
                  value: "2"
                - name: SHARED_VOLUME
                  value: /shared-volume
              volumeMounts:
                - name: model-volume
                  mountPath: /shared-volume
          volumes:
            - name: model-volume
              persistentVolumeClaim:
                claimName: model-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-backend-deployment-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-backend
      dataset: "1"
  template:
    metadata:
      labels:
        app: credit-backend
        dataset: "1"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: credit-backend
          image: xai-credit-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATASET_ID
              value: "1"
            - name: SHARED_VOLUME
              value: /shared-volume
            - name: MODEL_RELOAD_SECS
              value: "30"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: model-volume
              mountPath: /shared-volume
              readOnly: true
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: model-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: credit-backend-service-1
spec:
  type: ClusterIP
  selector:
    app: credit-backend
    dataset: "1"
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-backend-deployment-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-backend
      dataset: "2"
  template:
    metadata:
      labels:
        app: credit-backend
        dataset: "2"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: credit-backend
          image: xai-credit-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATASET_ID
              value: "2"
            - name: SHARED_VOLUME
              value: /shared-volume
            - name: MODEL_RELOAD_SECS
              value: "30"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: model-volume
              mountPath: /shared-volume
              readOnly: true
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: model-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: credit-backend-service-2
spec:
  type: ClusterIP
  selector:
    app: credit-backend
    dataset: "2"
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-load-balancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: credit-load-balancer
  template:
    metadata:
      labels:
        app: credit-load-balancer
    spec:
      containers:
        - name: credit-load-balancer
          image: xai-credit-loadbalancer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_1_URL
              value: "http://credit-backend-service-1:8000"
            - name: BACKEND_2_URL
              value: "http://credit-backend-service-2:8000"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: credit-load-balancer-service
spec:
  type: NodePort
  selector:
    app: credit-load-balancer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-backend-hpa-1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-backend-deployment-1
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-backend-hpa-2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-backend-deployment-2
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
